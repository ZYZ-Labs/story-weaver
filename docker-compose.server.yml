services:
  backend:
    image: ${BACKEND_IMAGE:?Please set BACKEND_IMAGE in your server .env}
    container_name: story-weaver-backend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?Please set SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?Please set SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?Please set SPRING_DATASOURCE_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:?Please set SPRING_DATA_REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      SPRING_DATA_REDIS_PASSWORD: ${SPRING_DATA_REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:?Please set JWT_SECRET}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*,http://192.168.*:*,http://10.*:*,https://home.silvericekey.fun,https://home.silvericekey.fun:*}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - "${BACKEND_LOG_DIR:-./volumes/backend/logs}:/app/logs"

  front:
    image: ${FRONTEND_IMAGE:?Please set FRONTEND_IMAGE in your server .env}
    container_name: story-weaver-front
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    expose:
      - "80"
    volumes:
      - "${FRONTEND_LOG_DIR:-./volumes/front/nginx-logs}:/var/log/nginx"

  gateway:
    image: nginx:1.27-alpine
    container_name: story-weaver-gateway
    restart: unless-stopped
    depends_on:
      - front
      - backend
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SERVER_NAME: ${SERVER_NAME:-home.silvericekey.fun}
      FRONT_UPSTREAM: http://front:80
      API_UPSTREAM: http://backend:8080
      HTTPS_PORT: ${HTTPS_PORT:-443}
      SSL_CERT_FILE: ${SSL_CERT_FILE:-/etc/nginx/ssl/fullchain.pem}
      SSL_CERT_KEY_FILE: ${SSL_CERT_KEY_FILE:-/etc/nginx/ssl/privkey.pem}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - "${SSL_CERT_DIR:-/usr/local/project/cer}:/etc/nginx/ssl:ro"
      - "${GATEWAY_LOG_DIR:-./volumes/gateway/nginx-logs}:/var/log/nginx"
    command:
      - /bin/sh
      - -c
      - |
        cat >/tmp/default.conf.template <<'EOF'
        map $$http_upgrade $$connection_upgrade {
            default upgrade;
            '' close;
        }

        server {
            listen 80;
            server_name $$SERVER_NAME;

            location / {
                return 301 https://$$host$$HTTPS_PORT_SUFFIX$$request_uri;
            }
        }

        server {
            listen 443 ssl http2;
            server_name $$SERVER_NAME;

            ssl_certificate $$SSL_CERT_FILE;
            ssl_certificate_key $$SSL_CERT_KEY_FILE;
            ssl_protocols TLSv1.2 TLSv1.3;
            ssl_session_cache shared:SSL:10m;
            ssl_session_timeout 10m;

            client_max_body_size 50m;

            location /api/ {
                proxy_pass $$API_UPSTREAM;
                proxy_http_version 1.1;
                proxy_set_header Host $$host;
                proxy_set_header X-Real-IP $$remote_addr;
                proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
                proxy_set_header X-Forwarded-Host $$host;
                proxy_set_header X-Forwarded-Port $$HTTPS_PORT;
                proxy_set_header Upgrade $$http_upgrade;
                proxy_set_header Connection $$connection_upgrade;
                proxy_buffering off;
                proxy_cache off;
                add_header X-Accel-Buffering "no";
                chunked_transfer_encoding on;
                proxy_connect_timeout 60s;
                proxy_send_timeout 3600s;
                proxy_read_timeout 3600s;
            }

            location / {
                proxy_pass $$FRONT_UPSTREAM;
                proxy_http_version 1.1;
                proxy_set_header Host $$host;
                proxy_set_header X-Real-IP $$remote_addr;
                proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
                proxy_set_header X-Forwarded-Host $$host;
                proxy_set_header X-Forwarded-Port $$HTTPS_PORT;
                proxy_connect_timeout 60s;
                proxy_send_timeout 300s;
                proxy_read_timeout 300s;
            }
        }
        EOF
        if [ "$$HTTPS_PORT" = "443" ]; then
          export HTTPS_PORT_SUFFIX=""
        else
          export HTTPS_PORT_SUFFIX=":$$HTTPS_PORT"
        fi
        envsubst '$$SERVER_NAME $$SSL_CERT_FILE $$SSL_CERT_KEY_FILE $$FRONT_UPSTREAM $$API_UPSTREAM $$HTTPS_PORT $$HTTPS_PORT_SUFFIX' \
          < /tmp/default.conf.template > /etc/nginx/conf.d/default.conf
        exec nginx -g 'daemon off;'
