# 本地开发配置示例：复制为 application.yml 后按需修改
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/story_weaver?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: your_mysql_username
    password: your_mysql_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  # HS256 需要至少 32 字节密钥
  secret: change-this-to-a-32-plus-char-jwt-secret
  expiration: 86400000
  header: Authorization
  token-prefix: "Bearer "
