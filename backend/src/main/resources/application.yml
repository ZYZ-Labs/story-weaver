spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://192.168.5.249:3306/story_weaver?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:192.168.5.249}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: ${JWT_SECRET:change-this-to-a-32-plus-char-jwt-secret}
  expiration: 86400000
  header: Authorization
  token-prefix: "Bearer "

story:
  summary-workflow:
    redis-proposal-store-enabled: ${STORY_SUMMARY_WORKFLOW_REDIS_PROPOSAL_STORE_ENABLED:true}
    proposal-ttl-minutes: ${STORY_SUMMARY_WORKFLOW_PROPOSAL_TTL_MINUTES:30}
    proposal-key-prefix: ${STORY_SUMMARY_WORKFLOW_PROPOSAL_KEY_PREFIX:story:summary-proposal:}
    conversation-timeout-seconds: ${STORY_SUMMARY_WORKFLOW_CONVERSATION_TIMEOUT_SECONDS:12}
    conversation-max-tokens: ${STORY_SUMMARY_WORKFLOW_CONVERSATION_MAX_TOKENS:900}
  scene-runtime:
    redis-store-enabled: ${STORY_SCENE_RUNTIME_REDIS_STORE_ENABLED:true}
    ttl-minutes: ${STORY_SCENE_RUNTIME_TTL_MINUTES:180}
    scene-state-key-prefix: ${STORY_SCENE_RUNTIME_SCENE_STATE_KEY_PREFIX:story:scene-runtime:state:}
    handoff-key-prefix: ${STORY_SCENE_RUNTIME_HANDOFF_KEY_PREFIX:story:scene-runtime:handoff:}
    chapter-manifest-key-prefix: ${STORY_SCENE_RUNTIME_CHAPTER_MANIFEST_KEY_PREFIX:story:scene-runtime:chapter-scenes:}
  state-system:
    redis-store-enabled: ${STORY_STATE_SYSTEM_REDIS_STORE_ENABLED:true}
    ttl-minutes: ${STORY_STATE_SYSTEM_TTL_MINUTES:720}
    event-key-prefix: ${STORY_STATE_SYSTEM_EVENT_KEY_PREFIX:story:state:event:}
    chapter-event-manifest-key-prefix: ${STORY_STATE_SYSTEM_CHAPTER_EVENT_MANIFEST_KEY_PREFIX:story:state:chapter-events:}
    snapshot-key-prefix: ${STORY_STATE_SYSTEM_SNAPSHOT_KEY_PREFIX:story:state:snapshot:}
    chapter-snapshot-manifest-key-prefix: ${STORY_STATE_SYSTEM_CHAPTER_SNAPSHOT_MANIFEST_KEY_PREFIX:story:state:chapter-snapshots:}
    patch-key-prefix: ${STORY_STATE_SYSTEM_PATCH_KEY_PREFIX:story:state:patch:}
    chapter-patch-manifest-key-prefix: ${STORY_STATE_SYSTEM_CHAPTER_PATCH_MANIFEST_KEY_PREFIX:story:state:chapter-patches:}
    chapter-reveal-state-key-prefix: ${STORY_STATE_SYSTEM_CHAPTER_REVEAL_STATE_KEY_PREFIX:story:state:chapter-reveal:}
