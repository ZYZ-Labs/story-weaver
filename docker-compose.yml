services:
  backend:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: story-weaver-backend
    working_dir: /app
    command: mvn spring-boot:run
    volumes:
      - ./backend:/app
      - maven_repo:/root/.m2
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?Please set SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?Please set SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:?Please set SPRING_DATA_REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      SPRING_DATA_REDIS_PASSWORD: ${SPRING_DATA_REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-32-plus-char-jwt-secret}
    ports:
      - "8080:8080"

  front:
    image: node:20-alpine
    container_name: story-weaver-front
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./front:/app
    environment:
      VITE_API_BASE_URL: /api
      VITE_API_PROXY_TARGET: http://backend:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  maven_repo:
